<!DOCTYPE html>
<html>
	<head>
		<style>
			.box {
				width: 50px;
				height: 50px;
				background-color: red;
				position: relative;
				left: 0;
				transition: left 1s ease;
			}
		
		</style>
		<script>
let moved = false;

function moveBox() {
  const box = document.getElementById("box");

  if (!moved) {
    box.style.left = "200px";
  } else {
    box.style.left = "0px";
  }

  moved = !moved;
}
</script>
	</head>
	<body>
		<div class="box" id="box"></div>
		<button onclick="moveBox()">Muovi</button>
	</body>
</html>

<!--creare un gioco in cui inserito il valore bisogna indovinare il numero ,
 range 100 se lo scarto supera 20 la pagina diventa rossa, se inferiorte a 10 gialla
  se inferiore a 5 la pagina diventa verde se indovina mette pagina verde e scritta grande HAI VINTO-->

<!doctype html>
<html>
<head>
<title>Indovina il numero</title>
<style>
  body {
     text-align:center; 
     font-family:Arial; 
    }
  #messaggio { 
    font-size:20px; 
    margin-top:20px; 
}

  .vittoria { 
    font-size:40px;
   font-weight:bold;
 }

</style>
</head>
<body>
<h1>Indovina il numero 1-100</h1>

<input id="inputNumero" type="number" min="1" max="100" />
<button id="pulsanteControlla">Prova</button>
<button id="pulsanteRicomincia">Rigioca</button>
<p id="messaggio"></p>

<script>
  let numeroSegreto = Math.floor(Math.random() * 101);

  function controllaNumero() {
    const numeroInserito = Number(document.getElementById('inputNumero').value);
    const messaggio = document.getElementById('messaggio');
    if (!numeroInserito) return;

    let differenza = Math.abs(numeroSegreto - numeroInserito);

    if (differenza == 0) {
      document.body.style.background = 'lightgreen';
      messaggio.innerHTML = '<span class="vittoria">HAI VINTO!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!</span>';
    } else if (differenza <= 5) {
      document.body.style.background = 'lightgreen';
      messaggio.textContent = 'Molto vicino!';
    } else if (differenza <= 10) {
      document.body.style.background = 'yellow';
      messaggio.textContent = 'Vicino!';
    } else {
      document.body.style.background = 'red';
      messaggio.textContent = 'Troppo lontano!';
    }
  }
  function ricominciaGioco() {
    numeroSegreto = Math.floor(Math.random() * 101); 
    document.body.style.background = 'white';        
    document.getElementById('messaggio').textContent = ''; 
    document.getElementById('inputNumero').value = ''; 
    document.getElementById('inputNumero').focus(); 
  }

  document.getElementById('pulsanteControlla').addEventListener('click', controllaNumero);
  document.getElementById('pulsanteRicomincia').addEventListener('click', ricominciaGioco);
</script>
</body>
</html>
</body>
</html>

<!--SONNA PARI/DISPARI-->
<!DOCTYPE html>

<head>

    <title>Somma e Pari/Dispari</title>
    <style>
        #risultato {
            width: 200px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            background-color: #eee;
        }
    </style>
</head>
<body>

    <h2>Somma di due numeri</h2>

    <input type="number" id="num1" placeholder="Numero 1">
    <input type="number" id="num2" placeholder="Numero 2">
    <br><br>

    <button onclick="somma()">Somma</button>
    <button onclick="verificaPariDispari()">Pari / Dispari</button>

    <div id="risultato">Risultato</div>

    <script>
        let totale = 0;

        function somma() {
            let n1 = parseInt(document.getElementById("num1").value);
            let n2 = parseInt(document.getElementById("num2").value);

            totale = n1 + n2;
            document.getElementById("risultato").innerHTML = totale;
        }

        function verificaPariDispari() {
            let div = document.getElementById("risultato");

            if (totale % 2 === 0) {
                div.style.backgroundColor = "lightblue";
                alert("Il numero è PARI");
            } else {
                div.style.backgroundColor = "lightcoral";
                alert("Il numero è DISPARI");
            }
        }
    </script>

</body>
</html>
